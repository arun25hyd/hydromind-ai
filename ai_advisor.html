<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HydroMind.AI — Under Maintenance</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0d0f12;font-family:'Space Mono',monospace;display:flex;align-items:center;justify-content:center;min-height:100vh;color:#e8eaf0;}
.wrap{text-align:center;padding:40px 20px;}
.logo{font-size:13px;font-weight:700;letter-spacing:.12em;color:#f97316;margin-bottom:32px;}
.logo span{color:#e8eaf0;}
h1{font-size:22px;font-weight:700;letter-spacing:.06em;color:#f97316;margin-bottom:12px;}
p{font-size:13px;color:#8A919E;line-height:1.8;max-width:380px;margin:0 auto 28px;}
.badge{display:inline-flex;align-items:center;gap:7px;background:rgba(249,115,22,0.08);border:1px solid rgba(249,115,22,0.25);border-radius:20px;padding:6px 16px;font-size:11px;color:#f97316;letter-spacing:.06em;}
.dot{width:7px;height:7px;border-radius:50%;background:#f97316;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">HM HYDRO<span>MIND</span>.AI</div>
  <h1>UNDER MAINTENANCE</h1>
  <p>We are performing scheduled maintenance and improvements. The platform will be back online shortly.</p>
  <div class="badge"><div class="dot"></div>MAINTENANCE IN PROGRESS</div>
</div>
</body>
</html>
