<!DOCTYPE html>
<html lang="en">
<head<script src="../js/main.js">


<script>
var KB_ALL = [];
var KB_FILTERED = [];
var KB_PAGE = 0;
var KB_PER_PAGE = 30;
var KB_ACTIVE_FILTER = 'all';

var CAT_LABELS = {
  pump:'Pump', motor:'Motor', valve:'Valve',
  crane_hydraulic:'Crane', troubleshooting:'Troubleshooting',
  electrical_plc:'Electrical', accessories:'Accessories',
  hydraulic_symbols:'Symbols', general:'General'
};

var CAT_ICONS = {
  pump:'⚙️', motor:'🔄', valve:'🔧',
  crane_hydraulic:'🏗️', troubleshooting:'🔍',
  electrical_plc:'⚡', accessories:'🔩',
  hydraulic_symbols:'📐', general:'📄'
};

async function loadKBFromSupabase(){
  var grid = document.getElementById('kbGrid');
  var label = document.getElementById('kbCountLabel');
  if(grid) grid.innerHTML = '<div style="color:var(--text3);font-size:.85rem;padding:1rem 0;">Loading documents from knowledge base...</div>';
  try {
    var resp = await fetch('https://frqefpoheewbornozvhc.supabase.co/rest/v1/kb_chunks?select=kb_id,doc_name,category,brand,component_type,schematic_count,tags,searchable_text&kb_id=not.is.null&order=kb_id.asc&limit=300',{
      headers:{
        'apikey':'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZycWVmcG9oZWV3Ym9ybm96dmhjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMTgxMTUsImV4cCI6MjA4ODY5NDExNX0.8wf65p5lmupngAYvxrqKy6PlspJMW1gHZ1dCAtuZGJ8',
        'Authorization':'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZycWVmcG9oZWV3Ym9ybm96dmhjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMTgxMTUsImV4cCI6MjA4ODY5NDExNX0.8wf65p5lmupngAYvxrqKy6PlspJMW1gHZ1dCAtuZGJ8'
      }
    });
    if(!resp.ok) throw new Error('Supabase error '+resp.status);
    KB_ALL = await resp.json();
    updateStats();
    filterKB(KB_ACTIVE_FILTER);
  } catch(e){
    if(grid) grid.innerHTML = '<div style="color:#e24b4a;font-size:.85rem;padding:1rem 0;">⚠️ Failed to load documents: '+e.message+'</div>';
    if(label) label.textContent = 'Error loading documents';
  }
}

function updateStats(){
  var brands = new Set(KB_ALL.map(function(e){return e.brand;}).filter(Boolean));
  var schematics = KB_ALL.reduce(function(s,e){return s+(e.schematic_count||0);},0);
  var statDocs = document.getElementById('statDocs');
  var statBrands = document.getElementById('statBrands');
  var statSchematics = document.getElementById('statSchematics');
  if(statDocs) statDocs.textContent = KB_ALL.length;
  if(statBrands) statBrands.textContent = brands.size;
  if(statSchematics) statSchematics.textContent = schematics.toLocaleString();
}

function filterKB(cat, btn){
  KB_ACTIVE_FILTER = cat;
  KB_PAGE = 0;
  if(btn){
    document.querySelectorAll('.kb-filter-btn').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active');
  }
  var search = (document.getElementById('kbSearch')||{}).value||'';
  applyFilter(cat, search);
}

function searchKB(val){
  KB_PAGE = 0;
  applyFilter(KB_ACTIVE_FILTER, val);
}

function applyFilter(cat, search){
  var s = (search||'').toLowerCase().trim();
  KB_FILTERED = KB_ALL.filter(function(e){
    var catMatch = cat==='all' || e.category===cat;
    if(!s) return catMatch;
    var inTitle = (e.doc_name||'').toLowerCase().includes(s);
    var inBrand = (e.brand||'').toLowerCase().includes(s);
    var inText  = (e.searchable_text||'').toLowerCase().includes(s);
    var inCat   = (e.category||'').toLowerCase().includes(s);
    return catMatch && (inTitle||inBrand||inText||inCat);
  });
  renderKBPage();
}

function renderKBPage(){
  var grid = document.getElementById('kbGrid');
  var label = document.getElementById('kbCountLabel');
  var moreBtn = document.getElementById('kbLoadMore');
  if(!grid) return;
  var slice = KB_FILTERED.slice(0, (KB_PAGE+1)*KB_PER_PAGE);
  if(label) label.textContent = 'Showing '+slice.length+' of '+KB_FILTERED.length+' documents';
  grid.innerHTML = slice.map(function(e){
    var icon = CAT_ICONS[e.category]||'📄';
    var catLabel = CAT_LABELS[e.category]||e.category;
    var schem = e.schematic_count > 0 ? '🗂 '+e.schematic_count+' schematics' : '';
    var desc = (e.searchable_text||'').substring(0,120);
    if(desc.length===120) desc += '...';
    return '<div class="kb-entry-card" onclick="window.location.href=\'advisor.html?q='+encodeURIComponent(e.doc_name)+'\'">'+
      '<div style="display:flex;align-items:flex-start;gap:.75rem;">'+
      '<span class="kb-entry-icon">'+icon+'</span>'+
      '<div style="flex:1;min-width:0;">'+
      '<div class="kb-entry-title">'+escHtml(e.doc_name||'')+'</div>'+
      (desc?'<div class="kb-entry-desc">'+escHtml(desc)+'</div>':'')+
      '<div class="kb-entry-meta">'+
      '<span class="kb-entry-id">'+escHtml(e.kb_id||'')+'</span>'+
      (e.brand && e.brand!=='Unknown'?'<span class="kb-entry-brand">'+escHtml(e.brand)+'</span>':'')+
      '<span class="kb-entry-cat">'+catLabel+'</span>'+
      (schem?'<span class="kb-entry-schem">'+schem+'</span>':'')+
      '</div></div></div></div>';
  }).join('');
  if(moreBtn) moreBtn.style.display = KB_FILTERED.length > slice.length ? 'block':'none';
}

function loadMoreKB(){
  KB_PAGE++;
  renderKBPage();
  window.scrollBy({top:300,behavior:'smooth'});
}

function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.addEventListener('DOMContentLoaded', loadKBFromSupabase);
</script>
</body>
</html>
