<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Industry News — HydroMind.AI</title>
<link rel="stylesheet" href="../css/style.css">
<style>
.news-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1.5rem;}
.news-card{background:rgba(8,22,40,.85);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:.25s;display:flex;flex-direction:column;}
.news-card:hover{border-color:rgba(200,165,80,.35);transform:translateY(-3px);}
.news-card.featured{grid-column:1/-1;}
.n-thumb{width:100%;height:160px;display:flex;align-items:center;justify-content:center;font-size:2.5rem;background:rgba(200,165,80,.04);flex-shrink:0;}
.news-card.featured .n-thumb{height:200px;}
.n-body{padding:1.1rem 1.25rem;flex:1;display:flex;flex-direction:column;gap:.45rem;}
.n-src{font-family:"Space Mono",monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--gold);}
.n-title{font-family:"Syne",sans-serif;font-size:.96rem;font-weight:700;color:var(--text1);line-height:1.35;}
.news-card.featured .n-title{font-size:1.12rem;}
.n-desc{font-size:.83rem;color:var(--text2);line-height:1.72;flex:1;}
.n-foot{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.4rem;margin-top:.3rem;}
.n-date{font-family:"Space Mono",monospace;font-size:.6rem;color:var(--text3);}
.n-cat{font-family:"Space Mono",monospace;font-size:.58rem;padding:2px 8px;border-radius:100px;border:1px solid var(--border);color:var(--text3);}
.n-link{font-size:.75rem;color:var(--gold);font-family:"Space Mono",monospace;text-decoration:none;padding:5px 13px;border:1px solid rgba(200,165,80,.3);border-radius:100px;transition:.2s;}
.n-link:hover{background:rgba(200,165,80,.1);}
.s-pill{padding:5px 13px;border:1px solid rgba(200,165,80,.15);border-radius:100px;font-family:"Space Mono",monospace;font-size:.63rem;color:var(--text3);background:transparent;cursor:pointer;transition:.2s;display:inline-block;}
.s-pill:hover,.s-pill.on{border-color:var(--gold);color:var(--gold);background:rgba(200,165,80,.07);}
.c-btn{padding:5px 13px;border:1px solid var(--border);border-radius:100px;font-family:"Space Mono",monospace;font-size:.63rem;color:var(--text3);cursor:pointer;transition:.2s;background:none;}
.c-btn:hover,.c-btn.on{border-color:var(--gold);color:var(--gold);background:rgba(200,165,80,.07);}
@media(max-width:700px){.news-grid{grid-template-columns:1fr;}.news-card.featured{grid-column:auto;}}
</style>
</head>
<body>
