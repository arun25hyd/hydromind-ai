<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Under Maintenance — HydroMind.AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0f12;color:#eef0f4;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#13161b;border:1px solid #1e2530;border-radius:16px;padding:52px 48px;max-width:520px;width:100%;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.5)}
.logo{display:inline-flex;align-items:center;gap:12px;margin-bottom:40px}
.logo-icon{width:44px;height:44px;background:linear-gradient(135deg,#f97316,#fb923c);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#000}
.logo-text{font-size:20px;font-weight:700;color:#eef0f4}
.logo-text span{color:#f97316}
.gear{font-size:52px;margin-bottom:24px;animation:spin 6s linear infinite;display:block}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
h1{font-size:26px;font-weight:800;color:#eef0f4;margin-bottom:12px}
p{font-size:15px;color:#8b95a5;line-height:1.65;margin-bottom:32px}
.badge{display:inline-flex;align-items:center;gap:8px;background:#1a2030;border:1px solid #f97316;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:600;color:#f97316;margin-bottom:32px}
.dot{width:8px;height:8px;background:#f97316;border-radius:50%;animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.contact{font-size:13px;color:#5a6472}
.contact a{color:#f97316;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">HM</div>
    <div class="logo-text">HydroMind<span>.AI</span></div>
  </div>
  <span class="gear">⚙</span>
  <h1>Under Maintenance</h1>
  <p>We are upgrading HydroMind.AI to deliver a better experience.<br>The platform will be back online shortly.</p>
  <div class="badge"><span class="dot"></span>Work in progress — check back soon</div>
  <div class="contact">Questions? <a href="mailto:support@hydromindai.com">support@hydromindai.com</a></div>
</div>
</body>
</html>
